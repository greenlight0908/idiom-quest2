<style>
@font-face {
  font-family: 'NeoDGM';
  src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2105_2@1.0/NeoDunggeunmoPro-Regular.woff') format('woff');
  font-display: swap;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --ink:#171329; --night:#2b2548; --night2:#3a315c; --paper:#fff2d6;
  --lantern:#ffc269; --lantern2:#ff8f5a; --pink:#ff9eb5; --danger:#ef6978; --jade:#72d5a3;
  --line:#6c5b92; --shadow:#0c0918;
}
html,body{height:100%;min-height:100dvh;}
body{
  font-family:'NeoDGM',monospace; color:var(--paper);
  background:
    radial-gradient(circle at 20% 18%,#50366a66 0 2px,transparent 3px),
    radial-gradient(circle at 82% 28%,#ffc26955 0 1px,transparent 2px),
    radial-gradient(circle at 68% 78%,#7252a044 0 2px,transparent 3px),
    linear-gradient(160deg,#171329 0%,#211938 48%,#100d20 100%);
  background-size:190px 190px,130px 130px,230px 230px,auto;
  display:flex; align-items:center; justify-content:center; padding:8px;
  touch-action:manipulation; overflow-x:hidden;
}
body::before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.08;background:radial-gradient(circle at 35% 25%,#fff8 0 1px,transparent 1.5px);background-size:7px 7px;mix-blend-mode:soft-light;}
#wrap{ width:100%; max-width:520px; position:relative; isolation:isolate; filter:drop-shadow(0 24px 38px #05030dcc); }
#wrap::before{
  content:"四字成語"; position:absolute; z-index:-1; right:-34px; top:-38px;
  color:#ffc26914; font-family:serif; font-size:66px; letter-spacing:-5px; writing-mode:vertical-rl;
}
#hud{
  display:flex; justify-content:space-between; align-items:center;
  font-size:13px; padding:8px 12px; letter-spacing:1px;
  border:3px solid var(--paper); border-bottom:none; border-radius:14px 14px 0 0;
  background:linear-gradient(180deg,#4a3b6b 0%,#2b2348 52%,#1b1731 100%); min-height:38px;
  text-shadow:0 2px 3px #080611; box-shadow:inset 0 1px #ffffff44,inset 0 -4px #120e25,0 -5px 22px #ffc26912;
}
#hudL::before{content:"✦"; color:var(--lantern); margin-right:7px; animation:glow 2s ease-in-out infinite;}
#hudL{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
#hud .prog{ color:var(--lantern); text-shadow:0 0 10px #ffb85c88; }
#hudR{flex-shrink:0;margin-left:10px;white-space:nowrap;}
#stage-wrap{ position:relative; border:3px solid var(--paper); background:#000; border-radius:0 0 16px 16px; overflow:hidden; box-shadow:inset 0 0 0 3px #161126,inset 0 0 45px #05030d99,0 12px 34px #05030daa; }
#stage-wrap::after{
  content:""; position:absolute; inset:0; pointer-events:none; z-index:2;
  background:linear-gradient(110deg,#ffffff0e 0%,transparent 19%,transparent 76%,#8fc9ff08 100%);
  box-shadow:inset 0 0 28px #0a07175e,inset 0 1px #ffffff33; mix-blend-mode:screen;
}
canvas#cv{ position:relative; z-index:0; display:block; width:100%; image-rendering:pixelated; filter:saturate(1.025) contrast(1.015) brightness(1.01); transition:filter .5s; transform-origin:center; touch-action:none; }
canvas#cv.smooth-scene{image-rendering:auto;}
#stage-wrap.realistic::after{background:linear-gradient(110deg,#ffffff0d,transparent 22%,transparent 78%,#8fc9ff08);box-shadow:inset 0 0 34px #080d1790,inset 0 1px #ffffff2b;mix-blend-mode:screen;}
#stage-wrap.cafe-scene::after{background:linear-gradient(110deg,#ffffff12 0%,transparent 24%,transparent 76%,#d8f7ff0b 100%);box-shadow:inset 0 0 18px #17242d45,inset 0 1px #ffffff4d;mix-blend-mode:screen;}
canvas#cv.scene-enter{animation:scene-enter .42s cubic-bezier(.2,.75,.25,1);}
@keyframes scene-enter{0%{opacity:.25;filter:saturate(.7) contrast(1.12) brightness(.55);transform:scale(1.025)}100%{opacity:1;filter:saturate(1.18) contrast(1.07) brightness(1.025);transform:scale(1)}}

}
#stage-wrap.title-scene canvas{filter:saturate(.75) brightness(.35) contrast(1.08);}
#stage-wrap.title-scene #modal{background:linear-gradient(180deg,#08061108,#0806118c 84%,#080611c4);backdrop-filter:none;}
#stage-wrap.title-scene #modal .box{
  max-width:360px; margin-top:5%;
  background:linear-gradient(150deg,#271f43e8,#151127f2);
  border-color:#ffe7b5; box-shadow:0 12px 0 #08061199,0 18px 45px #000c,inset 0 0 0 2px #9a79c566;
}
#stage-wrap.title-scene .title-big{font-size:39px;line-height:1.12;margin-top:12px;}
#stage-wrap.title-scene .title-big::before{
  content:"四字成語"; display:block; width:max-content; margin:0 auto 8px; padding:3px 10px;
  color:#24192d; background:linear-gradient(90deg,#d88a54,#ffd88c,#d88a54);
  border:2px solid #2d1b2d; border-radius:999px; font-size:11px; letter-spacing:4px;
  text-shadow:none; box-shadow:0 3px 0 #0c0918;
}
@keyframes title-drift{from{transform:scale(1.02) translate3d(-.4%,0,0)}to{transform:scale(1.08) translate3d(.6%,-1%,0)}}
#dlg{
  position:absolute; left:8px; right:8px; bottom:8px;
  z-index:3; background:linear-gradient(145deg,#30264af2,#151126f8 68%); border:3px solid #fff0cf; border-radius:12px;
  padding:14px 14px 17px; font-size:14px; line-height:1.75;
  min-height:78px; display:none; cursor:pointer; word-break:keep-all; overflow-wrap:anywhere;
  text-shadow:0 2px 2px #080611; backdrop-filter:blur(5px); box-shadow:0 8px 0 #0b0818bb,0 14px 28px #0009,inset 0 0 0 2px #9b87c366,inset 0 1px #ffffff33;
}
#dlg .speaker{
  position:absolute; top:-13px; left:10px;
  background:linear-gradient(180deg,#fff0b8,#ffc269 58%,#ee9455); color:var(--ink);
  padding:1px 10px; font-size:12px; border:2px solid var(--ink); border-radius:8px;
}
#dlg .cursor{ position:absolute; right:10px; bottom:4px; color:var(--lantern); animation:blink .9s steps(1) infinite; }
@keyframes blink{50%{opacity:0;}}
#modal{ position:absolute; inset:0; z-index:4; display:none; background:radial-gradient(circle at 50% 34%,#4a3a68d9,#07050fee 78%); padding:14px; overflow-y:auto; backdrop-filter:blur(5px) saturate(1.15); }
#modal .box{
  position:relative; background:linear-gradient(155deg,#3b315d,#241e40 62%,#1e1935); border:3px solid var(--paper); border-radius:14px;
  padding:19px 17px; margin:auto; max-width:440px; box-shadow:0 12px 0 #080611aa,0 20px 44px #000b,inset 0 0 0 2px #927cac77,inset 0 1px #ffffff2f;
}
#modal .box::before,#modal .box::after{content:"◆";position:absolute;top:7px;color:var(--lantern);font-size:8px;opacity:.9;}
#modal .box::before{left:8px} #modal .box::after{right:8px}
#modal .box.mini{ margin-top:12%; }
.qtext{ font-size:14px; line-height:1.7; margin-bottom:14px; word-break:keep-all; }
.qtext .tag{ color:var(--lantern); }
.title-big{ font-size:36px; text-align:center; letter-spacing:6px; margin:8px 0 14px; text-shadow:0 3px 0 #7c3f4d,0 6px 0 #0b0818,0 0 20px #ffb85c55; }
.red{ color:var(--danger);} .green{ color:var(--jade);} .yellow{ color:var(--lantern);}
button.opt, button.btn{
  font-family:inherit; font-size:15px; width:100%;
  background:linear-gradient(180deg,#292242,#19152d); color:var(--paper);
  border:2px solid #d9cdbd; border-bottom-width:4px; border-radius:9px; padding:11px 12px;
  text-align:left; cursor:pointer; margin-bottom:8px; letter-spacing:1px;
  transition:transform .12s,filter .12s,background .12s;
}
button.btn{ text-align:center; }
button.opt:hover,button.opt:focus-visible,button.btn:hover,button.btn:focus-visible{
  background:var(--lantern); color:var(--ink); border-color:var(--lantern);
  outline:none; box-shadow:0 0 18px #ffb85c55; transform:translateY(-1px);
}
button.btn.primary{ background:linear-gradient(180deg,#ffd989,var(--lantern) 56%,#f09a51); color:var(--ink); border-color:#fff0c5 #8e5339 #783f32; box-shadow:0 4px 0 #110d20,0 0 18px #ffb85c33; }
button.btn.primary:hover{filter:brightness(1.08)}
.explain{
  background:var(--ink); border:3px solid var(--danger); border-radius:8px;
  padding:10px 12px; font-size:13px; line-height:1.7; margin:10px 0; word-break:keep-all;
}
.explain.good{ border-color:var(--jade); }
.explain b{ color:var(--lantern); }
.leaderboard-box{max-width:480px!important;padding-left:12px!important;padding-right:12px!important;}
.leaderboard-list{font-size:13px;line-height:1.45;padding:8px 9px;}
.lb-row{display:grid;grid-template-columns:42px minmax(0,1fr) 52px;align-items:start;gap:5px;padding:5px 0;border-bottom:1px solid #ffffff18;}
.lb-row:last-child{border-bottom:0;}
.lb-rank{white-space:nowrap;color:#ffe2a0;}
.lb-name{min-width:0;white-space:normal;word-break:keep-all;overflow-wrap:anywhere;line-height:1.45;}
.lb-time{text-align:right;white-space:nowrap;color:#d8efe9;}
.lb-row.me{color:var(--lantern);font-weight:bold;}
.lb-row.me .lb-rank,.lb-row.me .lb-time{color:var(--lantern);}
.grammar-clock{display:flex;justify-content:space-between;gap:8px;margin:8px 0;padding:8px 10px;border:2px solid #d8bd69;border-radius:8px;background:#151c2f;color:#ffe6a0;font-size:12px;}

function isWall(x,y){ return x<=0||x>=COLS-1||y<=0||y>=ROWS-1; }
function inList(list,x,y){ return list.some(p=>p[0]===x&&p[1]===y); }
function inZone(x,y,x0,x1,y0,y1){return x>=x0&&x<=x1&&y>=y0&&y<=y1;}
function academyDoorAt(x,y,direction=null){
  return CLASSROOM_DOORS.find(door=>x>=door.x-(door.width||1)+1&&x<=door.x&&door.y===y&&(!direction||door.entryDir===direction))||null;
}
function academyDoorFromClick(screenX,screenY){
  if(screenY<38||screenY>132)return null;
  const candidates=CLASSROOM_DOORS.filter(door=>Math.abs(screenX-door.screenX)<=34);
  candidates.sort((a,b)=>Math.abs(screenX-a.screenX)-Math.abs(screenX-b.screenX));
  return candidates[0]||null;
}
function useAcademyDoor(door){
  if(door.label==="1강의실"){enterClassroom();return;}
  showDialog([{sp:door.label,text:`${door.label}은 아직 준비중입니다.`}],()=>{mode="explore";});
}
function statueAt(x,y){ return statues.find(s=>s.x===x&&s.y===y&&!s.cleared); }
function blocked(x,y){
  if(scene==="cafe"){
    // 책상은 0~3행, 의자는 4행이다. 5행 통로까지 접근한 뒤 말을 건다.
    if(y<=3) return true;
    if(y===4&&!inList(EMPTY_SEATS,x,y)) return true;
    if(inZone(x,y,6,8,10,10))return false;
    return isWall(x,y)||inList(CAFE_SOLIDS,x,y)||inList(COUNTER,x,y)||inList(PLANTS,x,y)||!!studentAt(x,y)||doctorAt(x,y)||campManagerAt(x,y);
  }
  if(scene==="street"){
    if(inZone(x,y,6,8,10,10)) return false;
    if(inZone(x,y,14,14,4,9)) return false;
    if(y<=5) return true;
    return isWall(x,y);
  }
  if(scene==="station"){
    // 새 정면 역사 건물은 2~6행, 출입문 앞은 7행이다.
    if(inZone(x,y,6,8,0,0)) return false;
    if(inZone(x,y,6,8,7,7)) return false;
    if(y>=2&&y<=6&&x>=3&&x<=11) return true;
    return isWall(x,y);
  }
  if(scene==="platform"){
    if(inZone(x,y,6,8,0,0)) return false;
    if(y<=5&&x!==7) return true;
    if(y===6&&(x<6||x>8)) return true;
    return isWall(x,y)||inList(PLATFORM_PASSENGERS,x,y);
  }
  if(scene==="subway") return isWall(x,y);
  if(scene==="convenience"){
    if(inZone(x,y,9,11,5,5)) return false;
    if(inZone(x,y,0,0,6,9)||inZone(x,y,14,14,6,9)) return false;
    if(y<=4||(x<=3&&y<=5)) return true;
    if(x>=6&&y<=5) return true;
    return isWall(x,y);
  }
  if(scene==="convenienceInterior"){
    if(inZone(x,y,6,8,10,10)) return false;
    return isWall(x,y)||y<=2||inList(CONVENIENCE_FURNITURE_CELLS,x,y);
  }
  if(scene==="school"){
    if(chickenAt(x,y)) return true;
    if(inZone(x,y,6,8,10,10)) return false;
    if(inZone(x,y,6,8,3,3)) return false;
    // 중앙 통로에서 왼쪽 보도의 닭 앞까지 걸어갈 수 있는 접근로.
    if(inZone(x,y,3,8,9,9)) return false;
    if(y<=3) return true;
    if(y>=4&&y<=9&&(x<6||x>8)) return true;
    return isWall(x,y);
  }
  if(scene==="library"){
    if(inZone(x,y,6,8,10,10)) return false;
    if(x<=1||x>=13||(y>=9&&(x<=4||x>=11))) return true;
    // 자동 이동은 책상뿐 아니라 의자도 우회한다. 수동 이동의 착석 처리는 tryMove에서 먼저 실행된다.
    return isWall(x,y)||y<=2||inList(LIBRARY_DESKS,x,y)||inList(LIBRARY_SEATS,x,y);
  }
  if(scene==="restaurant"){
    if(inZone(x,y,6,8,10,10)) return false;
    return isWall(x,y)||y<=3||inList(RESTAURANT_TABLES,x,y)||!!poetAt(x,y);
  }
  if(scene==="academy"){
    if(inZone(x,y,6,8,10,10)) return false;
    if(academyDoorAt(x,y))return false;
    return isWall(x,y)||y<=2||inList(ACADEMY_DESK_CELLS,x,y)||(x===ANGELA_POS[0]&&y===ANGELA_POS[1])||CLASSROOM_DOORS.some(d=>d.x===x&&d.y===y);
  }
  if(scene==="classroom"){
    if(inZone(x,y,6,8,10,10)) return false;
    const activeTeachers=mentorName?MATH_TEACHERS.filter(t=>t.name===mentorName):MATH_TEACHERS;
    return isWall(x,y)||y<=2||inList(CLASSROOM_FURNITURE_CELLS,x,y)||activeTeachers.some(t=>t.x===x&&t.y===y);
  }
  if(scene==="hell"){
    if(inZone(x,y,6,8,10,10))return false;
    if(y<=2)return true;
  }
  if(x===EXIT[0]&&y===EXIT[1]) return true;
  if(isWall(x,y)) return true;
  if(statueAt(x,y)) return true;
  if(yeomraVisible && x>=6&&x<=8&&y>=1&&y<=3) return true;
  return false;
}

const rr=(x,y,w,h,r)=>{ // 둥근 사각형

};

const glow=(x,y,r,color,alpha=1)=>{

  g.addColorStop(0,color); g.addColorStop(.45,color.replace(/\)$/,' / 0.24)')); g.addColorStop(1,"transparent");
  ctx.save(); ctx.globalAlpha=alpha; ctx.fillStyle=g; ctx.fillRect(x-r,y-r,r*2,r*2); ctx.restore();
};

function drawBrandLogo(x,y,w,h,fallback="시대정신"){
  if(sidaeLogo.complete&&sidaeLogo.naturalWidth){
    const scale=Math.min(w/sidaeLogo.naturalWidth,h/sidaeLogo.naturalHeight);
    const dw=sidaeLogo.naturalWidth*scale,dh=sidaeLogo.naturalHeight*scale;
    ctx.drawImage(sidaeLogo,x+(w-dw)/2,y+(h-dh)/2,dw,dh);
  }else{
    ctx.fillStyle="#173a4b";ctx.font="bold 14px NeoDGM,monospace";ctx.textAlign="center";ctx.fillText(fallback,x+w/2,y+h*.72);
  }
}

function drawShop(x,y,w,h,body,roof){
  ctx.fillStyle=body; ctx.fillRect(x,y,w,h);
  ctx.fillStyle=roof; ctx.fillRect(x,y,w,10);
  ctx.fillStyle="#00000030"; ctx.fillRect(x,y+h-6,w,6);
  ctx.fillStyle="#ffe9a8";
  const cols=Math.max(2,Math.floor(w/22));
  for(let r=0;r<2;r++)for(let c=0;c<cols;c++){ if(Math.sin(x+r*3+c*2)>-.3){ ctx.globalAlpha=.55; ctx.fillRect(x+8+c*((w-16)/cols), y+18+r*20, 10, 12); } }
  ctx.globalAlpha=1;
}

  ]},
  {year:"1945년 2월 무렵",place:"해방 약 여섯 달 전 · 이인국 병원 진찰실",kind:"liberation",lines:[
    {sp:"내레이션",text:"기억은 다시 여섯 달 전으로 거슬러 갔다. 형무소에서 병보석으로 나온 사상범 춘석이 뼈만 남은 몸으로 업혀 와 간호원의 부축을 받으며 진찰대에 앉았다."},
    {sp:"내레이션",text:"이인국은 병세를 들으면서도 입원 여부보다 돈을 낼 수 있는지, 일본인 간부들이 드나드는 병원에 사상범을 들였다는 소문이 날지를 먼저 계산했다."},
    {sp:"내레이션",text:"그는 관선 시의원이자 모범적인 황국 신민이라는 자신의 지위가 무너질까 두려웠다. 결국 응급 처치만 한 뒤 입원실이 없다는 말로 환자를 돌려보냈다."},
    {sp:"춘석",text:"입원해서 치료받지 못하면 다시 쓰러집니다. 한 번만 살려 주십시오."},
    {sp:"이인국",text:"응급 처치는 했소. 입원실이 없으니 다른 곳을 알아보시오."},
    {sp:"내레이션",text:"춘석의 집은 병원 건너편 골목이었다. 이인국에게는 금세 잊힐 일이었지만 춘석에게는 해방 뒤에도 지워지지 않을 기억이 되었다."}
  ]},
  {year:"1945년 8월 하순 · 그날 저녁",place:"소련군 탱크가 들어온 거리",kind:"tanks",lines:[
    {sp:"내레이션",text:"시간은 다시 해방 직후로 돌아왔다. 소련군이 들어온다는 소식이 퍼지자 이인국은 벽장 속 ‘국어 상용의 가’ 표창장을 꺼내 한 글자도 남지 않도록 찢었다."},
    {sp:"내레이션",text:"그 표창장은 가족이 집 안에서도 일본말만 쓰고 아이들을 일본 학교에 보낸 결과였다. 그는 부끄러움보다 일본인과 교제할 때 유용했던 증표를 잃는 아쉬움을 먼저 느꼈다."},
    {sp:"아내",text:"탱크 부대가 들어왔어요. 거리는 사람들로 가득한데, 어서 나가 봅시다."},
    {sp:"내레이션",text:"태극기와 붉은 깃발 사이로 탱크가 지나고 만세와 환호가 이어졌다. 이인국은 박수도 치지 못한 채 누가 자신의 태도를 살피는지 주변만 두리번거렸다."},
    {sp:"내레이션",text:"집으로 돌아온 그는 라디오의 주둔군 포고문을 들었다. 시민의 생명과 재산을 보장하고 직장을 지키라는 말에도, 앞으로 무엇에 기대어 살아야 할지만 생각했다."}
  ]},
  {year:"현재 · 브라운 관사로 가는 차 안",place:"석간신문이 불러낸 원식의 기억",kind:"ending",lines:[
    {sp:"내레이션",text:"이인국은 차 안에서 석간신문을 펼쳤다. ‘북한 소련 유학생 서독으로 탈출’이라는 제목이 눈에 들어오자, 생사를 모르는 아들 원식이 떠올랐다."},
    {sp:"내레이션",text:"1·4 후퇴 때 그는 청진기가 든 손가방과 회중시계를 가지고 월남했다. 첫 아내는 거제도 수용소에서 죽었고, 모스크바에 남은 원식과는 전쟁 뒤 소식이 끊겼다."},
    {sp:"이인국",text:"사태를 빨리 읽고 빠져나올 줄 알아야지. 원식은 왜 자기 아비만큼도 임기응변을 못 하는가."},
    {sp:"내레이션",text:"그는 아들을 걱정하면서도 아들의 고지식함을 탓했다. 아들의 실종조차 자신의 처세법이 옳다는 믿음을 확인하는 기준으로 삼았다."}
  ]},
  {year:"전쟁이 나기 전 · 소련군 점령기",place:"원식을 모스크바로 보낼 무렵",kind:"station",lines:[
    {sp:"내레이션",text:"기억 속에서 이인국은 의과 대학에 들어간 원식에게 러시아어를 배우라고 재촉했다. 일본말이 출세를 돕던 시대가 끝났으니 이제는 새 권력의 언어를 익혀야 한다는 논리였다."},
    {sp:"이인국",text:"고기가 물을 떠나 살 수 없다면 그 물속에서 살 방법을 찾아야 한다. 이제는 노어가 판을 친다."},
    {sp:"첫 아내",text:"이제 겨우 죽을 고비를 면했는데 아이까지 그 한복판에 넣지 맙시다. 눈에 띄지 않게 살면 안 되겠어요?"},
    {sp:"이인국",text:"원식이 소련에서 돌아오면 누구도 우리에게 함부로 말하지 못할 거요."},
    {sp:"내레이션",text:"그는 스텐코프와 당 간부의 추천으로 원식의 모스크바 유학을 밀어붙였다. 이듬해 전쟁이 터지자 편지가 끊겼고, 아들을 보낸 근심은 첫 아내의 병을 깊게 했다고 그는 뒤늦게 생각했다."}
  ]},
  {year:"해방 직후 · 치안대 개편 다음날",place:"치안대 조사실 · 빼앗긴 회중시계",kind:"prison",lines:[
    {sp:"내레이션",text:"자동차에서 내리던 현재의 이인국에게 스텐코프의 목소리가 되살아났다. 기억은 자위대가 치안대로 바뀐 다음 날, 자신이 연행된 순간으로 급격히 되돌아갔다."},
    {sp:"내레이션",text:"시멘트 바닥에 무릎을 꿇은 그는 일본인이라는 보호막이 사라졌음을 절감했다. 도망칠 시간이 사흘만 더 있었더라면 하는 후회뿐, 과거에 대한 반성은 없었다."},
    {sp:"춘석",text:"일본의 앞잡이로 살며 민족과 조국을 팔아먹었으니, 이제 대가를 치러야 한다."},
    {sp:"내레이션",text:"일본 병사 군복과 완장을 찬 춘석의 군화가 이인국을 쓰러뜨렸다. 예전에 거부한 환자가 새 권력의 편에서 심판자로 돌아온 것이다."},
    {sp:"내레이션",text:"정신을 차렸을 때 한 소련 병사가 양복 안쪽의 회중시계를 발견했다. 이인국이 두 손으로 막았지만 병사는 시계줄을 끊어 시계를 가져갔다."},
    {sp:"이인국",text:"이것만은 안 돼. 내 이름이 새겨진 졸업 수상품이야."},
    {sp:"내레이션",text:"말이 통하지 않는 병사에게 시계를 빼앗긴 그는 ‘죽음과 시계’를 되뇌었다. 그 순간부터 시계를 되찾는 일은 살아남는 일과 같은 의미가 되었다."}
  ]},
  {year:"체포 뒤 한 달 무렵",place:"미결감 · 노어 회화책과 죄목",kind:"prison",lines:[
    {sp:"내레이션",text:"감방 생활이 한 달을 넘자 이인국은 한 학생이 두고 간 노어 회화책을 처음부터 꼼꼼히 읽었다. 말을 아끼고 새 권력의 언어를 익히는 일이 유일한 대비책이었다."},
    {sp:"내레이션",text:"양곡조합의 쌀을 몰래 팔아넘긴 일, 주민을 보국대에 강제로 동원한 일, 반일 투사의 치료를 거부한 일, 일제에 협력한 행위가 죄목으로 떠올랐다."},
    {sp:"이인국",text:"식민지 백성이 별수 있었나. 일본인에게 기대지 않은 사람이 어디 있었다고."},
    {sp:"내레이션",text:"그는 자신을 합리화한 뒤에야 잠시 마음이 편해졌다. 취조 때 직업이 의사라고 하자 ‘독또우루’를 되풀이하던 스텐코프의 표정에서 막연한 희망을 찾았다."}
  ]},
  {year:"수감 중 어느 새벽",place:"감방에 번진 적리 · 응급치료실",kind:"dysentery",lines:[
    {sp:"내레이션",text:"어두운 새벽, 옆의 청년이 신음했다. 이인국은 젖은 옷자락과 피가 섞인 배설물을 보고 적리, 곧 전염성 이질임을 알아챘다."},
    {sp:"이인국",text:"적리요. 전염병이니 환자를 바로 격리해야 하오."},
    {sp:"내레이션",text:"다른 감방에서도 같은 환자가 늘어났다. 이인국은 자신도 병들어 죽을까 두려워했고, 사상범이 옥사하면 책임자가 문책받는 사정 때문에 응급치료실에서 일하라는 명령을 받았다."},
    {sp:"이인국",text:"의사라는 직업이 다시 살 길을 열었군. 하늘이 무너져도 빠져나갈 구멍은 있다."},
    {sp:"내레이션",text:"그는 환자 치료에 힘을 쏟아 소련 군의관의 인정을 받았다. 그러나 형벌이 끝난 것은 아니었고, 이 보이지 않는 구속에서 완전히 벗어날 다음 기회를 노렸다."}
  ]},
  {year:"그해 크리스마스 무렵",place:"소련군 야전병원 · 스텐코프의 혹 수술",kind:"surgery",lines:[
    {sp:"내레이션",text:"이인국은 환자를 치료하면서 스텐코프의 왼쪽 뺨에 붙은 오리알만 한 혹을 계속 살폈다. 그 혹을 고치면 자신을 구해 줄 권력자의 신임을 얻을 수 있다고 판단했다."},
    {sp:"내레이션",text:"크리스마스 무렵 술기운이 오른 스텐코프가 순시하자, 이인국은 말과 손짓을 섞어 수술을 제안했다. 일본인 시장의 혹을 성공적으로 수술한 경험도 내세웠다."},
    {sp:"스텐코프",text:"좋소. 군의관들의 진단을 받은 뒤 수술을 진행합시다."},
    {sp:"내레이션",text:"이인국은 실패하면 총살을 받는다는 서약서에 서명했다. 자기 병원의 기구를 가져오고 소련 군의관 세 명을 조수처럼 지휘하며 수술대 앞에 섰다."},
    {sp:"내레이션",text:"기구 소리와 숨소리만 들리는 방에서 수술은 예상보다 빨리 끝났다. 의술은 환자를 살리는 능력이면서 동시에 이인국 자신을 살리는 거래 수단이 되었다."}
  ]},
  {year:"수술 뒤 완치된 날과 그 다음날",place:"스텐코프의 병실과 집무실",kind:"clinic",lines:[
    {sp:"내레이션",text:"완치되어 퇴원하는 날 스텐코프는 이인국의 손을 세게 쥐고 엄지를 치켜세웠다. ‘꺼삐딴 리’라는 호칭은 뛰어난 의사라는 칭찬인 동시에 최고의 기회주의자를 풍자하는 제목이 되었다."},
    {sp:"스텐코프",text:"꺼삐딴 리, 고맙소. 당신이 첫째요."},
    {sp:"내레이션",text:"다음 날 스텐코프는 집에서 통근해도 좋다고 허락하고 부탁이 있는지 물었다. 이인국은 망설이다 체포 때 빼앗긴 회중시계의 시간과 장소를 자세히 설명했다."},
    {sp:"스텐코프",text:"붉은 군대가 그런 일을 했을 리 없지만, 내가 책임지고 찾아보겠소."},
    {sp:"내레이션",text:"이인국은 부탁 때문에 관계를 망칠까 다시 불안해했다. 그러나 결국 시계를 돌려받았고, 스텐코프의 배경으로 원식의 유학까지 추진할 수 있었다."}
  ]},
  {year:"현재 · 오후 3시 무렵",place:"브라운의 관사 앞 · 성조기",kind:"ending",lines:[
    {sp:"내레이션",text:"차가 브라운의 관사 앞에 닿으며 긴 회상이 끝났다. 이인국은 성조기를 바라보다 해방 직후의 붉은 깃발과 스텐코프가 찾아 준 회중시계를 함께 떠올렸다."},
    {sp:"내레이션",text:"대사관에는 여러 번 갔지만 관사를 찾은 것은 처음이었다. 브라운은 삼 년 전 나미가 미국으로 갈 때부터 장학과 유학 절차를 도운 사람이었다."},
    {sp:"이인국",text:"일본과 소련을 지나 이제는 미국이다. 이번에도 상대가 원하는 것을 정확히 보여 주면 된다."},
    {sp:"내레이션",text:"현재의 성조기는 과거의 일장기와 붉은 깃발을 잇는다. 시대와 권력은 바뀌어도 이인국의 처세 방식은 바뀌지 않았다."}
  ]},
  {year:"현재 · 브라운과의 면담",place:"관사 응접실 · 고려청자 화병",kind:"embassy",lines:[
    {sp:"내레이션",text:"응접실에는 조선왕조실록과 대동야승 같은 고서, 금동불상과 백자 등 한국의 골동품이 가득했다. 이인국은 그것들도 누군가의 청탁 선물일지 모른다고 생각했다."},
    {sp:"내레이션",text:"그는 상감진사 고려청자 화병을 내놓았다. 문화재를 국외로 보낸다는 자책은 없었고, 이미 선물이 많은 브라운이 자신의 물건을 귀하게 여길지만 걱정했다."},
    {sp:"이인국",text:"대단한 것은 아닙니다. 그저 제 성의입니다."},
    {sp:"브라운",text:"귀중한 물건입니다. 닥터 리, 영어도 아주 정확하군요."},
    {sp:"내레이션",text:"이인국은 일본식 영어 교육을 받았고 최근에는 개인 교사에게 영어를 배우고 있다고 답했다. 일본어와 러시아어에 이어 영어까지 권력에 접근하는 도구가 되었다."}
  ]},
  {year:"현재 · 면담이 끝날 무렵",place:"브라운의 관사 · 미국행 통지",kind:"embassy",lines:[
    {sp:"내레이션",text:"브라운이 술을 권하자 이인국은 보드카를 단숨에 마시던 스텐코프의 얼굴을 겹쳐 보았다. 자신은 혈압을 생각해 스카치를 조금씩 마시며 결과를 기다렸다."},
    {sp:"브라운",text:"국무성에서 통지가 왔습니다. 떠날 때 소개장도 써 드리겠습니다."},

  if(!basePlayerName)return;

}
function applyPlayerTitle(){
  const raw=basePlayerName||playerName;if(!raw)return;
  if(activeTitle==="grammar"&&grammarMaster)playerName=`품사를 이해한 ${raw}`;
  else if(activeTitle==="cat"&&catMaster)playerName=`고양이 ${raw}`;
  else if(activeTitle==="captain"&&captainMaster)playerName=`꺼삐딴 리 마스터 ${raw}`;
  else if(activeTitle==="mentor"&&mentorName)playerName=`${mentorName}의 제자 ${raw}`;
  else if(activeTitle==="train")playerName=`집에 가려다 실패한 ${raw}`;
  else if(activeTitle==="general")playerName=`사자성어 대장군 ${raw}`;
  else playerName=raw;
}

function startCaptainStory(){
  mode="story";captainStage=0;scene="captain";restaurantSeated=false;
  hudL.textContent="꺼삐딴 리";hudR.textContent=CAPTAIN_STORY[0].year;
  showCaptainTimeCard(0,()=>showDialog(CAPTAIN_STORY[0].lines,advanceCaptainStory));
}
function showCaptainTimeCard(stageIndex,done){
  const s=CAPTAIN_STORY[stageIndex],token=++captainTimeCardToken;
  if(!s){if(done)done();return;}
  fade.classList.add("captain-time-active");
  fade.style.background="#000";fade.style.pointerEvents="auto";fade.style.opacity=0;
  fade.innerHTML=`<div class="captain-time-card"><div class="captain-time-kicker">시간의 이동</div><strong class="captain-time-year">${s.year}</strong><span class="captain-time-place">${s.place}</span></div>`;
  requestAnimationFrame(()=>requestAnimationFrame(()=>{if(token===captainTimeCardToken)fade.style.opacity=1;}));
  setTimeout(()=>{if(token===captainTimeCardToken)fade.style.opacity=0;},1350);
  setTimeout(()=>{
    if(token!==captainTimeCardToken)return;
    fade.classList.remove("captain-time-active");fade.innerHTML="";fade.style.pointerEvents="none";
    if(done)done();
  },1750);
}
function advanceCaptainStory(){
  captainStage++;
  if(captainStage>=CAPTAIN_STORY.length){
    fade.innerHTML="";fade.style.background="#120d10";fade.style.opacity=1;fade.style.pointerEvents="auto";
    setTimeout(()=>{fade.style.opacity=0;fade.style.pointerEvents="none";
      showDialog([
        {sp:"서가 안내",text:"책의 마지막 장을 덮었다. 이제 작품을 제대로 이해했는지 확인해 보자."},
        {sp:"서가 안내",text:`${CAPTAIN_QUESTIONS.length}문제 가운데 다섯 문제가 무작위로 출제된다. 하나라도 틀리면 곧장 저승행이다.`}
      ],startCaptainQuiz);
    },550);return;
  }
  hudR.textContent=CAPTAIN_STORY[captainStage].year;
  showCaptainTimeCard(captainStage,()=>showDialog(CAPTAIN_STORY[captainStage].lines,advanceCaptainStory));
}

function startCaptainQuiz(){
  captainQuizSet=shuffle(CAPTAIN_QUESTIONS).slice(0,5);captainQuizIndex=0;mode="locked";
  showCaptainQuestion();
}
function showCaptainQuestion(){
  const q=captainQuizSet[captainQuizIndex];
  if(!q){awardCaptainMaster();return;}
  hudR.textContent=`문학 퀴즈 ${captainQuizIndex+1}/5`;
  openModal(`<div class="box">
    <div class="title-big yellow" style="font-size:19px;">꺼삐딴 리 독해 시험</div>
    <p class="hint" style="text-align:center;">무작위 문제 ${captainQuizIndex+1} / 5 · 한 문제라도 틀리면 저승행</p>
    <p class="qtext">${q.q}</p>
    ${q.o.map((o,i)=>`<button class="opt" data-captain-answer="${i}">${i+1}. ${o}</button>`).join("")}
  </div>`);
  modal.querySelectorAll("[data-captain-answer]").forEach(b=>b.onclick=()=>{
    const choice=+b.dataset.captainAnswer;
    if(choice!==q.a){captainQuizFail();return;}
    captainQuizIndex++;
    openModal(`<div class="box mini"><div class="title-big green">정답</div><div class="explain good">${q.e}</div><button class="btn primary" id="captainNextQ">${captainQuizIndex<5?"다음 문제":"결과 확인"}</button></div>`);
    document.getElementById("captainNextQ").onclick=showCaptainQuestion;
  });
}

function nextDialog(){
  if(typing){ clearInterval(typing); typing=null; dlgTxt.textContent=fullText; return; }
  if(dialogQueue.length===0){
    dlg.style.display="none";
    currentPlayerEmotion="neutral";
    const cb=dialogDone; dialogDone=null;
    if(cb) cb(); return;
  }
  const {sp,text,emotion}=dialogQueue.shift();
  currentPlayerEmotion=emotion||inferPlayerEmotion(text);
  dlgSp.textContent=sp; fullText=text; dlgTxt.textContent="";

function inferPlayerEmotion(text=""){
  if(/[?!]{2,}|뭐야|설마|어라|깜짝|놀랐/.test(text))return "surprised";
  if(/해냈|좋아|기쁘|고마워|만세/.test(text))return "happy";
  if(/슬프|미안|안 돼|안돼|눈물/.test(text))return "sad";
  if(/화가|용서 못|절대 안|분해/.test(text))return "angry";
  if(/부끄|민망|당황/.test(text))return "embarrassed";
  if(/음…|음\.\.\.|생각해|어떻게/.test(text))return "thinking";
  if(/반드시|해내겠|포기하지|각오/.test(text))return "determined";
  return "neutral";
}

  while(queue.length&&!found){
    const [x,y]=queue.shift();
    for(const [dx,dy] of WALK_DIRS){const nx=x+dx,ny=y+dy,k=`${nx},${ny}`;if(prev.has(k)||blocked(nx,ny))continue;prev.set(k,`${x},${y}`);if(goalKeys.has(k)){found=k;break;}queue.push([nx,ny]);}
  }
  if(!found)return;
  const path=[];for(let k=found;k&&k!==startKey;k=prev.get(k)){const [x,y]=k.split(",").map(Number);path.push([x,y]);}path.reverse();
  mode="autowalk";let i=0;
  const finish=()=>{if(scene!==startScene)return;mode=startMode;const dx=gx-px,dy=gy-py;if(Math.abs(dx)>Math.abs(dy))dir=dx>0?"right":"left";else if(dy)dir=dy>0?"down":"up";onArrive();};
  const tick=()=>{if(scene!==startScene){mode=startMode;return;}if(i>=path.length){finish();return;}const [nx,ny]=path[i++];dir=nx>px?"right":nx<px?"left":ny>py?"down":"up";px=nx;py=ny;stepFrame++;setTimeout(tick,72);};
  tick();
}

const moveJoystick=document.getElementById("moveJoystick");
const joystickKnob=moveJoystick.querySelector(".joystick-knob");
let joystickPointerId=null,joystickOriginX=0,joystickOriginY=0;
let joystickDirections=[],joystickAxis=0,joystickTimer=null;
let joystickSuppressClickUntil=0;
const JOYSTICK_DEAD_ZONE=11,JOYSTICK_MAX_RADIUS=42,JOYSTICK_REPEAT_MS=112;

function mobileMovementReady(){
  return (mode==="cafe"||mode==="explore")&&dlg.style.display!=="block"&&modal.style.display!=="block"&&fade.style.pointerEvents!=="auto";
}
function pointInJoystickZone(clientX,clientY){
  const rect=cv.getBoundingClientRect();
  if(!rect.width||!rect.height)return false;
  const x=clientX-rect.left,y=clientY-rect.top;
  return x>=0&&x<=rect.width*.58&&y>=rect.height*.36&&y<=rect.height;
}
function resetMobileJoystick(pointerId=null){
  if(pointerId!==null&&joystickPointerId!==pointerId)return;
  const activePointer=joystickPointerId;
  if(activePointer!==null)joystickSuppressClickUntil=Date.now()+500;
  if(joystickTimer!==null){clearTimeout(joystickTimer);joystickTimer=null;}
  joystickPointerId=null;joystickDirections=[];joystickAxis=0;
  try{if(activePointer!==null&&cv.hasPointerCapture(activePointer))cv.releasePointerCapture(activePointer);}catch(_err){}
  joystickKnob.style.transform="translate(-50%,-50%)";
  moveJoystick.classList.remove("active");
  moveJoystick.setAttribute("aria-hidden","true");
}
function runJoystickStep(){
  joystickTimer=null;
  if(joystickPointerId===null||!joystickDirections.length||!mobileMovementReady()){
    resetMobileJoystick();return;
  }
  const beforeScene=scene;
  const moveDir=joystickDirections[joystickAxis%joystickDirections.length];
  joystickAxis++;
  tryMove(moveDir);
  if(scene!==beforeScene||joystickPointerId===null||!mobileMovementReady()){
    resetMobileJoystick();return;
  }
  joystickTimer=setTimeout(runJoystickStep,JOYSTICK_REPEAT_MS);
}
function setJoystickVector(clientX,clientY){
  const dx=clientX-joystickOriginX,dy=clientY-joystickOriginY;
  const distance=Math.hypot(dx,dy);
  const scale=distance>JOYSTICK_MAX_RADIUS?JOYSTICK_MAX_RADIUS/distance:1;
  const knobX=dx*scale,knobY=dy*scale;
  joystickKnob.style.transform=`translate(-50%,-50%) translate(${knobX.toFixed(1)}px,${knobY.toFixed(1)}px)`;
  if(distance<JOYSTICK_DEAD_ZONE){
    joystickDirections=[];joystickAxis=0;
    if(joystickTimer!==null){clearTimeout(joystickTimer);joystickTimer=null;}
    return;
  }
  const ax=Math.abs(dx),ay=Math.abs(dy);
  const horizontal=dx<0?"left":"right",vertical=dy<0?"up":"down";
  let nextDirections;
  if(ax<ay*.42)nextDirections=[vertical];
  else if(ay<ax*.42)nextDirections=[horizontal];
  else nextDirections=ax>=ay?[horizontal,vertical]:[vertical,horizontal];
  const changed=nextDirections.join()!==joystickDirections.join();
  joystickDirections=nextDirections;
  if(changed)joystickAxis=0;
  if(joystickTimer===null)runJoystickStep();
}
cv.addEventListener("pointerdown",e=>{
  if(e.pointerType==="mouse"||joystickPointerId!==null||!mobileMovementReady()||!pointInJoystickZone(e.clientX,e.clientY))return;
  e.preventDefault();e.stopPropagation();
  joystickPointerId=e.pointerId;joystickOriginX=e.clientX;joystickOriginY=e.clientY;
  joystickSuppressClickUntil=Date.now()+650;
  const stageRect=stageWrap.getBoundingClientRect();
  const half=58,pad=5;
  const localX=Math.max(half+pad,Math.min(stageRect.width-half-pad,e.clientX-stageRect.left));
  const localY=Math.max(half+pad,Math.min(stageRect.height-half-pad,e.clientY-stageRect.top));
  moveJoystick.style.left=`${localX}px`;moveJoystick.style.top=`${localY}px`;
  moveJoystick.classList.add("active");moveJoystick.setAttribute("aria-hidden","false");
  try{cv.setPointerCapture(e.pointerId);}catch(_err){}
},{passive:false});
cv.addEventListener("pointermove",e=>{
  if(e.pointerId!==joystickPointerId)return;
  e.preventDefault();e.stopPropagation();setJoystickVector(e.clientX,e.clientY);
},{passive:false});
function finishJoystickPointer(e){
  if(e.pointerId!==joystickPointerId)return;
  e.preventDefault();joystickSuppressClickUntil=Date.now()+500;
  try{if(cv.hasPointerCapture(e.pointerId))cv.releasePointerCapture(e.pointerId);}catch(_err){}
  resetMobileJoystick(e.pointerId);
}
window.addEventListener("pointerup",finishJoystickPointer,{passive:false,capture:true});
window.addEventListener("pointercancel",finishJoystickPointer,{passive:false,capture:true});

function tryMove(d){
  if(mode!=="cafe"&&mode!=="explore") return;
  if(dlg.style.display==="block"||modal.style.display==="block") return;
  dir=d;
  const [dx,dy]=DIRS[d];
  const nx=px+dx, ny=py+dy;
  if(scene==="cafe"){
    const stu=studentAt(nx,ny);
    if(stu){ dir=d; showDialog([{sp:stu.name, text:stu.line}]); return; }
    if(doctorAt(nx,ny)){ dir=d; talkToDoctor(); return; }
    if(campManagerAt(nx,ny)){dir=d;talkToCampManager();return;}
    if(d==="down"&&inZone(nx,ny,6,8,10,10)){ dir=d; enterStreet(); return; }
  }
  if(scene==="street"){
    if(d==="down"&&inZone(nx,ny,6,8,10,10)){dir=d;enterStationFrame();return;}
    if(d==="right"&&inZone(nx,ny,14,14,4,9)){dir=d;enterConvenienceFrame();return;}
    if(d==="up"&&((nx===CAFE_DOOR[0]&&ny===CAFE_DOOR[1])||(px===CAFE_DOOR[0]&&py===CAFE_DOOR[1]))){ dir=d; enterCafeFromStreet(); return; }
    if(d==="up"&&((nx===HAOCHI_DOOR[0]&&ny===HAOCHI_DOOR[1])||(px===HAOCHI_DOOR[0]&&py===HAOCHI_DOOR[1]))){ dir=d; enterRestaurant(); return; }
    if(d==="up"&&((nx===ACADEMY_DOOR[0]&&ny===ACADEMY_DOOR[1])||(px===ACADEMY_DOOR[0]&&py===ACADEMY_DOOR[1]))){ dir=d; enterAcademy(); return; }
  }
  if(scene==="station"){
    if(d==="up"&&inZone(nx,ny,6,8,7,7)){dir=d;enterStationPlatform();return;}
    if(d==="up"&&inZone(nx,ny,6,8,0,0)){dir=d;leaveStationFrame();return;}
  }
  if(scene==="platform"){
    if(d==="up"&&inZone(nx,ny,6,8,6,6)){dir=d;boardStationTrain();return;}
    if(d==="up"&&inZone(nx,ny,6,8,0,0)){dir=d;leaveStationPlatform();return;}
  }
  if(scene==="convenience"){
    if(catAt(nx,ny)){dir=d;talkToCat();return;}
    if(d==="up"&&inZone(nx,ny,9,11,5,5)){dir=d;enterConvenienceInterior();return;}
    if(d==="left"&&inZone(nx,ny,0,0,6,9)){dir=d;leaveConvenienceFrame();return;}
    if(d==="right"&&inZone(nx,ny,14,14,6,9)){dir=d;enterSchoolFromConvenience();return;}
  }
  if(scene==="convenienceInterior"){
    if(nx===CONVENIENCE_CASHIER[0]&&ny===CONVENIENCE_CASHIER[1]){dir=d;showDialog([{sp:"안젤라",text:"안녕, 난 요새 맞춤법을 공부하고 있어. 너도 미리 공부해둬."}],()=>{mode="explore";});return;}
    if(d==="down"&&inZone(nx,ny,6,8,10,10)){dir=d;leaveConvenienceInterior();return;}
  }
  if(scene==="school"){
    if(chickenAt(nx,ny)){dir=d;talkToChicken();return;}
    if(d==="down"&&inZone(nx,ny,6,8,10,10)){dir=d;leaveSchoolToConvenience();return;}
    if(d==="up"&&inZone(nx,ny,6,8,3,3)){dir=d;enterLibraryFromSchool();return;}
  }
  if(scene==="library"){
    const bookcase=LIBRARY_BOOKCASES.find(z=>inZone(nx,ny,z.x0,z.x1,z.y0,z.y1));
    if(bookcase){dir=d;openLibraryBookMenu();return;}
    if(inList(LIBRARY_SEATS,nx,ny)){dir=d;px=nx;py=ny;stepFrame++;openSeatChoice();return;}
    if(d==="down"&&inZone(nx,ny,6,8,10,10)){dir=d;leaveLibraryToSchool();return;}
  }
  if(scene==="restaurant"){
    if(restaurantSeated) restaurantSeated=false;
    const poet=poetAt(nx,ny);
    if(poet){dir=d;interactWithPoet(poet);return;}
    if(d==="down"&&inZone(nx,ny,6,8,10,10)){dir=d;leaveRestaurant();return;}
  }
  if(scene==="academy"){
    if(nx===ANGELA_POS[0]&&(ny===ANGELA_POS[1]||ny===ANGELA_POS[1]+1)){dir=d;talkToAngela();return;}
    const classroom=academyDoorAt(nx,ny,d);
    if(classroom){dir=d;useAcademyDoor(classroom);return;}
    if(d==="down"&&inZone(nx,ny,6,8,10,10)){dir=d;leaveAcademy();return;}
  }
  if(scene==="classroom"){
    const teacher=mathTeacherAt(nx,ny);
    if(teacher&&(!mentorName||teacher.name===mentorName)){dir=d;askMathTeacher(teacher.name);return;}
    if(d==="down"&&inZone(nx,ny,6,8,10,10)){dir=d;leaveClassroom();return;}
  }
  if(scene==="hell"){
    const st=statueAt(nx,ny);
    if(st){ if(!st.cleared) openQuiz(st); return; }
    if(d==="down"&&inZone(nx,ny,6,8,10,10)){ openExitConfirm(); return; }
  }
  if(blocked(nx,ny)) return;
  px=nx; py=ny; stepFrame++;
  if(scene==="cafe" && mode==="cafe" && inList(EMPTY_SEATS,px,py)) openSeatChoice();
  if(scene==="restaurant"&&px===RESTAURANT_EMPTY_SEAT[0]&&py===RESTAURANT_EMPTY_SEAT[1]){restaurantSeated=false;openFoodOrder();}
}

let swX=0, swY=0, swT=0;
cv.addEventListener("touchstart",e=>{
  if(e.touches.length!==1) return;
  const t=e.touches[0];
  if(mobileMovementReady()&&pointInJoystickZone(t.clientX,t.clientY)){swT=0;return;}
  swX=t.clientX; swY=t.clientY; swT=Date.now();
},{passive:true});
cv.addEventListener("touchend",e=>{
  if(!swT||Date.now()<joystickSuppressClickUntil)return;
  const t=e.changedTouches[0];
  const dx=t.clientX-swX, dy=t.clientY-swY;
  const dist=Math.hypot(dx,dy);
  if(dist<24 || Date.now()-swT>600) return; // 짧으면 탭으로 처리
  const dirName=Math.abs(dx)>Math.abs(dy) ? (dx>0?"right":"left") : (dy>0?"down":"up");
  const steps=Math.min(4, Math.floor(dist/48)+1);
  const startScene=scene;
  for(let i=0;i<steps;i++){tryMove(dirName);if(scene!==startScene||mode==="locked"||mode==="story")break;}
},{passive:true});
document.querySelectorAll("#pad button").forEach(b=>{

});

async function loadGlobalSurvivalStat(){
  const box=document.getElementById("survivalStat");
  if(!box||!SERVER_URL)return;
  try{
    const res=await fetch(`${SERVER_URL}?action=stats&t=${Date.now()}`,{cache:"no-store"});
    if(!res.ok)throw new Error("stats");
    const stats=await res.json();
    const attempts=Math.max(0,Math.floor(Number(stats.attempts)||0));
    const survivals=Math.min(attempts,Math.max(0,Math.floor(Number(stats.survivals)||0)));
    const rate=attempts?Math.round(survivals/attempts*100):0;
    box.setAttribute("aria-label",`전체 학생 생환률 ${rate}%`);
    box.innerHTML=`<span>🔥 전체 학생 생환률</span><b>${rate}%</b><small>생환 ${survivals}회 / 도전 ${attempts}회 · 실패 기록은 7/12부터</small>`;
  }catch(e){
    box.innerHTML=`<span>🔥 전체 학생 생환률</span><b>--</b><small>서버 통계를 불러올 수 없습니다</small>`;
  }
}

    <p class="qtext" style="text-align:center;"><b class="yellow">🐓 닭의 품사 시험</b><br><span class="hint">문제 ${grammarQuizIndex+1} / ${GRAMMAR_QUIZ_COUNT} · 전체 문제은행 ${POS_QUESTION_BANK.length}문항</span></p>
    <div class="grammar-clock" id="grammarClock"><span>남은 시간 <b id="grammarRemain">${GRAMMAR_QUESTION_SECONDS}.0초</b></span><span>총 시간 <b id="grammarElapsed">${grammarElapsedText()}</b></span></div>
    <p class="qtext">${item.q}</p>
    ${item.opts.map((o,i)=>`<button class="opt" data-grammar-i="${i}">${i+1}. ${o}</button>`).join("")}
  </div>`);
  modal.querySelectorAll("[data-grammar-i]").forEach(b=>b.onclick=()=>answerGrammarQuiz(+b.dataset.grammarI));
  grammarQuizDeadline=Date.now()+GRAMMAR_QUESTION_SECONDS*1000;
  const tick=()=>{
    const remain=Math.max(0,grammarQuizDeadline-Date.now()),remainEl=document.getElementById("grammarRemain"),elapsedEl=document.getElementById("grammarElapsed"),clock=document.getElementById("grammarClock");
    if(remainEl)remainEl.textContent=`${(remain/1000).toFixed(1)}초`;
    if(elapsedEl)elapsedEl.textContent=grammarElapsedText();
    if(clock)clock.classList.toggle("danger",remain<=5000);
    if(remain<=0&&!grammarQuizLocked){grammarQuizLocked=true;stopGrammarQuizTimer();failGrammarQuiz("시간이 다 되었다.");}
  };
  tick();grammarQuizTimer=setInterval(tick,100);
}
function answerGrammarQuiz(choice){
  if(grammarQuizLocked)return;grammarQuizLocked=true;stopGrammarQuizTimer();
  const item=grammarQuizSet[grammarQuizIndex];closeModal();
  if(choice!==item.a){failGrammarQuiz(`틀렸다. 정답은 ${item.opts[item.a]}이다.`);return;}
  grammarQuizIndex++;
  if(grammarQuizIndex===1){
    showDialog([{sp:"닭",text:"너 품사를 공부했구나 제대로 공부했는지 확인해봐야겠군."}],showGrammarQuizQuestion);
    return;
  }
  if(grammarQuizIndex<GRAMMAR_QUIZ_COUNT){
    showDialog([{sp:"닭",text:`정답이다. ${item.e}`}],showGrammarQuizQuestion);
    return;
  }
  completeGrammarQuiz();
}

function normIdiom(s){ return String(s).replace(/\s+/g,"").replace(/[()（）]/g,""); }
function findIdiom(q){
  const nq=normIdiom(q);
  let hit=IDIOMS.find(it=>it[0]===nq); if(hit) return {type:"exact", it:hit};
  hit=IDIOMS.find(it=>it[1]===nq); if(hit) return {type:"exact", it:hit};
  hit=IDIOMS.find(it=>it[0].includes(nq)||nq.includes(it[0])); if(hit) return {type:"partial", it:hit};
  const scored=IDIOMS.map(it=>{ const chars=new Set(nq.split("")); let common=0; for(const c of it[0]) if(chars.has(c)) common++; return {it, common}; }).filter(o=>o.common>0).sort((a,b)=>b.common-a.common).slice(0,3);
  if(scored.length) return {type:"suggest", list:scored.map(o=>o.it)};
  return {type:"none", list:shuffle(IDIOMS).slice(0,3)};
}

function rankingNameKey(name){
  let compact=String(name||"").normalize("NFC").replace(/\s+/g,"").trim();
  compact=compact
    .replace(/^집에가려다실패한/,"")
    .replace(/^귀가에실패한/,"")
    .replace(/^품사를이해한/,"")
    .replace(/^고양이/,"")
    .replace(/^꺼삐딴리마스터/,"")
    .replace(/^꺼삐딴리/,"")
    .replace(/^사자성어대장군/,"")
    .replace(/^대장군/,"")
    .replace(/^[가-힣]{3}의?제자/,"")
    .replace(/^[가-힣]{3}제자/,"")
    .replace(/^[·:：-]+/,"");
  const hangul=[...compact].filter(ch=>/[가-힣]/.test(ch));
  if(hangul.length>=3)return hangul.slice(-3).join("");
  // 예전 서버가 칭호 중간에서 잘라 이름이 한두 글자만 남은 항목은
  // 다른 학생과 잘못 합쳐지지 않도록 전체 문자열을 별도 키로 유지한다.
  return `legacy:${String(name||"").replace(/\s+/g,"").toLowerCase()}`;
}
function rankingSubmitName(name){
  const raw=basePlayerName||String(name||"").trim();
  if(activeTitle==="train")return `귀가에 실패한 ${raw}`;
  if(activeTitle==="grammar")return `품사를 이해한 ${raw}`;
  if(activeTitle==="captain")return `꺼삐딴 리 ${raw}`;
  if(activeTitle==="mentor"&&mentorName)return `${mentorName} 제자 ${raw}`;
  if(activeTitle==="general")return `대장군 ${raw}`;
  if(activeTitle==="cat")return `고양이 ${raw}`;
  return raw;
}
function rankingStudentName(name){
  const key=rankingNameKey(name);
  return key.startsWith("legacy:")?String(name||"").trim():key;
}
function dedupeLeaderboard(list){
  const rows=(Array.isArray(list)?list:[]).map((e,i)=>({
    ...e,
    name:String(e&&e.name||"").trim(),
    sec:Number(e&&e.sec),
    _order:i
  })).filter(e=>e.name&&Number.isFinite(e.sec)&&e.sec>=0);
  rows.sort((a,b)=>a.sec-b.sec||(Number(a.ts)||0)-(Number(b.ts)||0)||a._order-b._order);
  const seen=new Set(),unique=[];
  for(const row of rows){
    const key=rankingNameKey(row.name);
    if(seen.has(key))continue;
    seen.add(key);delete row._order;unique.push(row);
  }
  return unique;
}
function escapeRankingText(value){
  return String(value??"").replace(/[&<>"']/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[ch]));
}
function rankingRowsHtml(list,limit=20,highlightKey=""){
  return list.slice(0,limit).map((e,i)=>{
    const me=highlightKey&&rankingNameKey(e.name)===highlightKey;
    return `<div class="lb-row${me?" me":""}"><span class="lb-rank">${i+1}위</span><span class="lb-name">${escapeRankingText(e.name)}${me?" ◀":""}</span><span class="lb-time">${fmt(e.sec)}</span></div>`;
  }).join("")||`<div style="text-align:center;">아직 기록이 없습니다</div>`;
}

async function addRecord(name,sec){
  const list=await lbLoad(),savedName=rankingSubmitName(name),key=rankingNameKey(savedName);
  const entry={name:savedName, sec:Math.round(sec), ts:Date.now(), avatar:selectedAvatarId};
  const trimmed=dedupeLeaderboard([...list,entry]).slice(0,50);
  const idx=trimmed.findIndex(e=>rankingNameKey(e.name)===key);
  const kept=idx>=0?trimmed[idx]:entry;
  const rank=idx>=0?idx+1:trimmed.length+1;
  await lbSave(trimmed);
  return {list:trimmed, rank, entry:kept, highlightKey:key};
}

    const wrongIds=shuffle(IDIOMS.filter(i=>i[0]!==w)).slice(0,3);

    /* 유형 2: 사자성어 제시 → 알맞은 상황 고르기 */
    const wrongs=shuffle(IDIOMS.filter(i=>i[0]!==w)).slice(0,3).map(i=>i[3]);

    answerIdx=options.indexOf(s);

    qhtml=`<span class="tag">【${w}(${h})】</span><br>이 사자성어를 쓰기에 가장 알맞은 상황은?`;
  } else {
    /* 유형 3: 뜻 제시 → 사자성어 고르기 */
    const wrongIds=shuffle(IDIOMS.filter(i=>i[0]!==w)).slice(0,3);
    options=shuffle([w,...wrongIds.map(i=>i[0])]);
    answerIdx=options.indexOf(w);
    optIdioms=options.map(o=>o===w?st.idiom:wrongIds.find(i=>i[0]===o));

  openModal(`

function winSequence(){
  mode="locked"; yeomraVisible=true;
  finished=true;
  let clearSec=(Date.now()-runStart)/1000;
  showDialog([
    {sp:"염라대왕", text:"...놀랍구나. 열다섯 석상의 봉인을 모두 풀다니."},
    {sp:"염라대왕", text:`${playerName}. 공부하지 않은 죄, 이것으로 사면하노라.`},
    {sp:"염라대왕", text:"이승으로 돌아가거든 오늘 배운 것을 잊지 마라. 도망치지 말고... 스스로를 속이지도 마라."},
    {sp:"내레이션", text:"눈앞이 하얗게 밝아진다..."}
  ], ()=>{
    fade.innerHTML="";
    fade.style.background="#fff"; fade.style.opacity=1; fade.style.pointerEvents="auto";
    setTimeout(async ()=>{
      fade.style.background="#000"; fade.style.opacity=0; fade.style.pointerEvents="none";
      let res, label="이 기기 기록";
      let serverSec=null;
      const rankName=rankingSubmitName(playerName),rankKey=rankingNameKey(rankName);
      if(SERVER_URL && sessionToken){
        serverSec=await submitScore(playerName);
      }
      if(serverSec!==null){
        try{
          await new Promise(r=>setTimeout(r,1200));
          const list=dedupeLeaderboard([...(await fetchGlobalLB()),{name:rankName,sec:serverSec,ts:-1,avatar:selectedAvatarId}]);
          const idx=list.findIndex(e=>rankingNameKey(e.name)===rankKey);
          const entry=idx>=0?list[idx]:{name:rankName,sec:serverSec,ts:-1,avatar:selectedAvatarId};
          res={list, rank:idx>=0?idx+1:list.length+1, entry, highlightKey:rankKey};
          clearSec=serverSec;
          label="전체 통합 랭킹";
        }catch(e){ res=await addRecord(playerName, clearSec); }
      } else {
        res=await addRecord(playerName, clearSec);
      }
      const rows=rankingRowsHtml(res.list,10,res.highlightKey||rankingNameKey(res.entry.name));
      const isChampion = (res.rank===1);
      if(isChampion){ champName=rankingStudentName(res.entry.name);champAvatarId=selectedAvatarId;saveChampionAvatar(champName,selectedAvatarId); }
      const championBanner = isChampion ? `
          <div class="explain good" style="text-align:center; border-color:var(--lantern);">
            🎉 <b style="font-size:20px;">사자성어 대장군 탄생!</b> 🎉<br>
            <span class="yellow">${playerName}</span>(이)가 통합랭킹 1위에 올랐다!<br>
            이제 스터디카페의 <b>「사자성어 대장군 ${playerName}」</b>(으)로 등장한다.
          </div>` : "";
      openModal(`
        <div class="box">
          <div class="title-big green" style="letter-spacing:2px;">생 환</div>
          <p class="qtext" style="text-align:center;">${eun(playerName)} 스터디카페 책상에서 눈을 떴다.<br>펼쳐진 책 위, 침 자국이 선명하다.</p>
          <div class="explain good" style="text-align:center;">
            🏆 칭호 획득<br><b style="font-size:20px;">「사자성어 대장군 ${playerName}」</b><br><br>
            클리어 시간 <b>${fmt(clearSec)}</b> · 전체 <b>${res.rank}위</b>
          </div>
          ${championBanner}
          <div class="explain good leaderboard-list">
            <div style="text-align:center; margin-bottom:8px;">👑 명예의 전당 · ${label}</div>
            ${rows}
          </div>
          <button class="btn primary" id="cafeBtn">스터디카페로 돌아간다</button>
          <button class="btn" id="againBtn">한 번 더 모험한다</button>
          <button class="btn" id="homeBtn">처음으로</button>
        </div>`);
      document.getElementById("cafeBtn").onclick=()=>{ closeModal(); yeomraVisible=false; finished=false; startCafe(); };
      document.getElementById("againBtn").onclick=()=>{ closeModal(); enterHellDirect(); };
      document.getElementById("homeBtn").onclick=()=>{ closeModal(); yeomraVisible=false; showTitle(); };
    },1400);
  });
}
function enterHellDirect(){
  scene="hell"; px=7; py=8; dir="up"; cleared=0; yeomraVisible=false;
  hudL.textContent=`${playerName} · 한자성어 나라`;
  spawnStatues(); updateHud(); mode="explore";
}

if(!resumeLibraryQuizFromStory())showTitle();

/* ═══════════════ PWA 서비스 워커 등록 + 학생별 자동 업데이트 ═══════════════ */
async function forceAppUpdate(){
  appVersionBtn.disabled=true;appVersionBtn.textContent="업데이트 확인 중…";
  try{
    if("serviceWorker" in navigator){
      const reg=await navigator.serviceWorker.getRegistration();
      if(reg){
        await reg.update();
        if(reg.waiting)reg.waiting.postMessage({type:"SKIP_WAITING"});
      }
    }
    if("caches" in window){
      const keys=await caches.keys();
      await Promise.all(keys.filter(key=>key.startsWith("idiom-quest-")).map(key=>caches.delete(key)));
    }
    const url=new URL(location.href);url.searchParams.set("appVersion",String(Date.now()));
    location.replace(url.href);
  }catch(e){
    appVersionBtn.disabled=false;appVersionBtn.textContent=`버전 ${APP_VERSION} · 다시 확인`;
  }
}
appVersionBtn.addEventListener("click",forceAppUpdate);

if("serviceWorker" in navigator){
  let refreshing=false;
  navigator.serviceWorker.addEventListener("controllerchange",()=>{
    if(refreshing)return;
    refreshing=true;
    location.reload();
  });
  navigator.serviceWorker.addEventListener("message",event=>{
    if(event.data?.type==="APP_VERSION")appVersionBtn.textContent=`버전 ${APP_VERSION}`;
  });
  window.addEventListener("load",async()=>{
    try{
      const reg=await navigator.serviceWorker.register("./sw.js",{updateViaCache:"none"});
      const check=()=>reg.update().catch(()=>{});
      await check();
      setInterval(check,10*60*1000);
      window.addEventListener("online",check);
      document.addEventListener("visibilitychange",()=>{if(document.visibilityState==="visible")check();});
      reg.addEventListener("updatefound",()=>{
        const nw=reg.installing;
        if(!nw)return;
        nw.addEventListener("statechange",()=>{
          if(nw.state==="installed"&&navigator.serviceWorker.controller)nw.postMessage({type:"SKIP_WAITING"});
        });
      });
    }catch(e){
      appVersionBtn.textContent=`버전 ${APP_VERSION} · 오프라인`;
    }
  });
}
